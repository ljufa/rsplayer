[env]
# ram disk
# CARGO_TARGET_DIR = "/dev/shm/cargo_target"
CARGO_TARGET_DIR = "target"

# RPI_HOST = "192.168.5.3"
# TARGET = "arm-unknown-linux-gnueabihf"

RPI_HOST = "192.168.5.4"
TARGET = "aarch64-unknown-linux-gnu"
# TARGET = "x86_64-unknown-linux-gnu"

RELEASE_VERSION = "1.8.61"
RELEASE_BRANCH = "main_public"

[config]
default_to_workspace = false


# ---- BUILD Backend----

[tasks.build_release]
command = "cross"
args = [
    "build",
    "--target",
    "${TARGET}",
    "--release",
    "--package",
    "rsplayer",
    "--bin",
    "rsplayer",
]
[tasks.build_dev]
command = "cross"
args = ["build", "--package", "rsplayer", "--bin", "rsplayer"]
[tasks.build_ui_release]
cwd = "rsplayer_web_ui"
command = "cargo"
args = ["make", "build_release"]

[tasks.build_ui_dev]
cwd = "rsplayer_web_ui"
command = "cargo"
args = ["make", "build_dev"]

[tasks.package_deb_release]
script = [
    "mkdir -p target/release",
    "cp target/${TARGET}/release/rsplayer target/release/rsplayer",
    "cargo deb --no-build -p rsplayer --target=${TARGET} --deb-version ${RELEASE_VERSION}",
]

[tasks.package_rpm_release]
script = [
    "mkdir -p target/${TARGET}/rpm",
    "cp target/${TARGET}/release/rsplayer target/${TARGET}/rpm/rsplayer",
    "cp PKGS/debian/etc/systemd/system/rsplayer.service target/${TARGET}/rpm/rsplayer.service",
    "cp PKGS/debian/etc/polkit-1/rules.d/99-rsplayer.rules target/${TARGET}/rpm/99-rsplayer.rules",
    "cp PKGS/debian/opt/rsplayer/env target/${TARGET}/rpm/env",
    "cp PKGS/debian/opt/rsplayer/self.crt target/${TARGET}/rpm/self.crt",
    "cp PKGS/debian/opt/rsplayer/self.key target/${TARGET}/rpm/self.key",
    "case ${TARGET} in",
    "  arm-unknown-linux-gnueabihf) rpm_arch=armv6hl ;;",
    "  armv7-unknown-linux-gnueabihf) rpm_arch=armv7hl ;;",
    "  aarch64-unknown-linux-gnu) rpm_arch=aarch64 ;;",
    "  x86_64-unknown-linux-gnu) rpm_arch=x86_64 ;;",
    "  *) rpm_arch=${TARGET} ;;",
    "esac",
    "sed -e \"s/@VERSION@/${RELEASE_VERSION}/g\" -e \"s/@DATE@/$(LC_ALL=C date +\"%a %b %d %Y\")/g\" PKGS/rpm/rsplayer.spec.in > target/${TARGET}/rpm/rsplayer.spec",
    "cd target/${TARGET}/rpm",
    "# Create source tarball",
    "mkdir -p rsplayer-${RELEASE_VERSION}",
    "cp rsplayer rsplayer-${RELEASE_VERSION}/",
    "cp rsplayer.service rsplayer-${RELEASE_VERSION}/",
    "cp 99-rsplayer.rules rsplayer-${RELEASE_VERSION}/",
    "cp env rsplayer-${RELEASE_VERSION}/",
    "cp self.crt rsplayer-${RELEASE_VERSION}/",
    "cp self.key rsplayer-${RELEASE_VERSION}/",
    "tar -czf rsplayer-${RELEASE_VERSION}.tar.gz rsplayer-${RELEASE_VERSION}",
    "rm -rf rsplayer-${RELEASE_VERSION}",
    "# Build RPM using --target to set the architecture without needing a native build env",
    "rpmbuild -bb --target ${rpm_arch} --define \"_topdir $(pwd)\" --define \"_builddir $(pwd)\" --define \"_sourcedir $(pwd)\" --define \"_srcrpmdir $(pwd)\" --define \"_rpmdir $(pwd)/RPMS\" rsplayer.spec",
    "mv RPMS/${rpm_arch}/*.rpm rsplayer_${RELEASE_VERSION}_${rpm_arch}.rpm 2>/dev/null || true",
]

[tasks.package_arch_release]
script = [
    "mkdir -p target/${TARGET}/arch",
    "cp target/${TARGET}/release/rsplayer target/${TARGET}/arch/rsplayer",
    "cp PKGS/debian/etc/systemd/system/rsplayer.service target/${TARGET}/arch/rsplayer.service",
    "cp PKGS/debian/etc/polkit-1/rules.d/99-rsplayer.rules target/${TARGET}/arch/99-rsplayer.rules",
    "cp PKGS/debian/opt/rsplayer/env target/${TARGET}/arch/env",
    "cp PKGS/debian/opt/rsplayer/self.crt target/${TARGET}/arch/self.crt",
    "cp PKGS/debian/opt/rsplayer/self.key target/${TARGET}/arch/self.key",
    "case ${TARGET} in",
    "  arm-unknown-linux-gnueabihf) arch_arch=armhfv6 ;;",
    "  armv7-unknown-linux-gnueabihf) arch_arch=armhfv7 ;;",
    "  aarch64-unknown-linux-gnu) arch_arch=arm64 ;;",
    "  x86_64-unknown-linux-gnu) arch_arch=amd64 ;;",
    "  *) arch_arch=${TARGET} ;;",
    "esac",
    "sed -e \"s/@VERSION@/${RELEASE_VERSION}/g\" -e \"s/@ARCH@/${arch_arch}/g\" PKGS/arch/PKGBUILD.in > target/${TARGET}/arch/PKGBUILD",
    "sed -e \"s/@VERSION@/${RELEASE_VERSION}/g\" PKGS/arch/rsplayer.install.in > target/${TARGET}/arch/rsplayer.install",
    "cd target/${TARGET}/arch && tar -czf rsplayer_${RELEASE_VERSION}_${arch_arch}.tgz rsplayer rsplayer.service 99-rsplayer.rules env self.crt self.key",
]

# ---- LINT ----
[tasks.clippy]
description = "Lint with Clippy"
install_crate = { rustup_component_name = "clippy", binary = "cargo-clippy", test_arg = "--help" }
command = "cargo"
args = [
    "clippy",
    "--fix",
    "--allow-dirty",
    "--allow-staged",
    "--all-features",
    "--",
    "--deny",
    "warnings",
    "--deny",
    "clippy::pedantic",
    "--deny",
    "clippy::nursery",
    "--allow",
    "clippy::use_self",
    "--allow",
    "clippy::module_name_repetitions",
    "--allow",
    "clippy::must_use_candidate",
    "--allow",
    "let_underscore_drop",
    "--allow",
    "clippy::missing_panics_doc",
    "--allow",
    "clippy::missing_errors_doc",
    "--allow",
    "clippy::use_self",
    "--allow",
    "clippy::significant-drop-tightening",
    "--allow",
    "clippy::similar_names",
]

[tasks.clippy_in_cross]
description = "Lint with clippy in the pipeline"
command = "cross"
args = [
    "clippy",
    "--target",
    "${TARGET}",
    "--",
    "--deny",
    "warnings",
    "--deny",
    "clippy::pedantic",
    "--deny",
    "clippy::nursery",
    "--allow",
    "clippy::use_self",
    "--allow",
    "clippy::module_name_repetitions",
    "--allow",
    "clippy::must_use_candidate",
    "--allow",
    "let_underscore_drop",
    "--allow",
    "clippy::missing_panics_doc",
    "--allow",
    "clippy::missing_errors_doc",
    "--allow",
    "clippy::use_self",
    "--allow",
    "clippy::significant-drop-tightening",
    "--allow",
    "clippy::similar_names",
]

[tasks.test_in_cross]
command = "cross"
args = ["test", "--target", "${TARGET}"]

[tasks.format]
description = "Format with rustfmt"
command = "cargo"
args = ["fmt"]

# ---- Local DEV ----
[tasks.kill_local]
script = "sudo pkill -9 rsplayer || true"

[tasks.run_local]
dependencies = ["kill_local"]
env = { "RUST_LOG" = "rsplayer=info,rsplayer_playback=debug,warp=info", "RUST_BACKTRACE" = "full", "PORT" = "8000", "TLS_PORT" = "8443", "TLS_CERT_PATH" = "self.crt", "TLS_CERT_KEY_PATH" = "self.key" }
cwd = ".run"
command = "cargo"
args = ["run"]

[tasks.copy_remote]
dependencies = ["build_release"]
script = [
    "rsync -avvP --rsync-path=\"sudo rsync\" ${CARGO_TARGET_DIR}/${TARGET}/release/rsplayer pi@${RPI_HOST}:/usr/bin",
    "ssh -x pi@${RPI_HOST} \"sudo systemctl restart rsplayer\"",
]
[tasks.copy_remote_dev]
dependencies = ["build_dev"]
script = [
    "rsync -avvP --rsync-path=\"sudo rsync\" target/${TARGET}/debug/rsplayer pi@${RPI_HOST}:/usr/bin",
]

[tasks.package_deb_local]
dependencies = ["build_ui_release", "build_release", "package_deb_release"]
script = "rsync -avvP target/${TARGET}/debian/*.deb pi@${RPI_HOST}:~"

[tasks.tag]
script = [
    "git tag ${RELEASE_VERSION} ${RELEASE_BRANCH}",
    "git push originpublic ${RELEASE_VERSION}",
]
