[env]
# Native cargo writes to "target". Cross-using tasks override CARGO_TARGET_DIR
# to "target/cross" locally so host-arch build scripts (linked against the
# host's glibc) don't get reused inside the older-glibc cross containers.
# In CI (CI=true), the per-task override is skipped so existing workflow paths
# (target/${TARGET}/...) keep working.
CARGO_TARGET_DIR = "target"
CROSS_TARGET_DIR = { value = "target/cross", condition = { env_not_set = ["CI"] } }

# TARGET_HOST = "127.0.0.1"
# TARGET_HOST = "192.168.5.3"
TARGET_HOST = "192.168.5.4"

# TARGET = "arm-unknown-linux-gnueabihf"
TARGET = "aarch64-unknown-linux-gnu"
# TARGET = "x86_64-unknown-linux-gnu"
# TARGET = "riscv64gc-unknown-linux-gnu"
# TARGET = "aarch64-apple-darwin"
# TARGET = "x86_64-apple-darwin"

RELEASE_VERSION = "3.1.0"
RELEASE_BRANCH = "main_public"

[config]    
default_to_workspace = false


# ---- BUILD Backend----
[tasks.build_release]
script = [
    "set -e",
    "extra_flags=''",
    "case ${TARGET} in",
    "  aarch64-apple-darwin|x86_64-apple-darwin) extra_flags='--no-default-features' ;;",
    "esac",
    "cross build --target ${TARGET} --release --package rsplayer --bin rsplayer ${extra_flags}",
]

[tasks.build_release.env]
CARGO_TARGET_DIR = { value = "target/cross", condition = { env_not_set = ["CI"] } }
RUST_SYSROOT_LIB = { script = ["echo $(rustc --print sysroot)/lib"] }
CROSS_CONTAINER_OPTS = "-e LD_LIBRARY_PATH=${RUST_SYSROOT_LIB} -v ${RUST_SYSROOT_LIB}:${RUST_SYSROOT_LIB}"

[tasks.build_dev]
command = "cargo"
args = ["build", "--package", "rsplayer", "--bin", "rsplayer"]

[tasks.build_ui_release]
cwd = "rsplayer_web_ui"
command = "cargo"
args = ["make", "build_release"]

[tasks.build_ui_dev]
cwd = "rsplayer_web_ui"
command = "cargo"
args = ["make", "build_dev"]

[tasks.package_deb_release]
script = [
    "mkdir -p target/release",
    "cp target/${TARGET}/release/rsplayer target/release/rsplayer",
    "cargo deb --no-build -p rsplayer --target=${TARGET} --deb-version ${RELEASE_VERSION}",
]

[tasks.package_rpm_release]
script = [
    "RPM_DIR=target/${TARGET}/rpm",
    "mkdir -p ${RPM_DIR}",
    "cp target/${TARGET}/release/rsplayer ${RPM_DIR}/rsplayer",
    "cp PKGS/debian/etc/systemd/system/rsplayer.service ${RPM_DIR}/rsplayer.service",
    "cp PKGS/debian/etc/polkit-1/rules.d/99-rsplayer.rules ${RPM_DIR}/99-rsplayer.rules",
    "cp PKGS/debian/opt/rsplayer/env ${RPM_DIR}/env",
    "cp PKGS/debian/opt/rsplayer/self.crt ${RPM_DIR}/self.crt",
    "cp PKGS/debian/opt/rsplayer/self.key ${RPM_DIR}/self.key",
    "case ${TARGET} in",
    "  arm-unknown-linux-gnueabihf) rpm_arch=armv6hl ;;",
    "  armv7-unknown-linux-gnueabihf) rpm_arch=armv7hl ;;",
    "  aarch64-unknown-linux-gnu) rpm_arch=aarch64 ;;",
    "  x86_64-unknown-linux-gnu) rpm_arch=x86_64 ;;",
    "  riscv64gc-unknown-linux-gnu) rpm_arch=riscv64 ;;",
    "  *) rpm_arch=${TARGET} ;;",
    "esac",
    "sed -e \"s/@VERSION@/${RELEASE_VERSION}/g\" -e \"s/@DATE@/$(LC_ALL=C date +\"%a %b %d %Y\")/g\" PKGS/rpm/rsplayer.spec.in > ${RPM_DIR}/rsplayer.spec",
    "# Create source tarball",
    "mkdir -p ${RPM_DIR}/rsplayer-${RELEASE_VERSION}",
    "cp ${RPM_DIR}/rsplayer ${RPM_DIR}/rsplayer-${RELEASE_VERSION}/",
    "cp ${RPM_DIR}/rsplayer.service ${RPM_DIR}/rsplayer-${RELEASE_VERSION}/",
    "cp ${RPM_DIR}/99-rsplayer.rules ${RPM_DIR}/rsplayer-${RELEASE_VERSION}/",
    "cp ${RPM_DIR}/env ${RPM_DIR}/rsplayer-${RELEASE_VERSION}/",
    "cp ${RPM_DIR}/self.crt ${RPM_DIR}/rsplayer-${RELEASE_VERSION}/",
    "cp ${RPM_DIR}/self.key ${RPM_DIR}/rsplayer-${RELEASE_VERSION}/",
    "# Build source tarball, RPM, and move output — all in one cd to avoid cwd issues",
    "cd ${RPM_DIR} && tar -czf rsplayer-${RELEASE_VERSION}.tar.gz rsplayer-${RELEASE_VERSION} && rm -rf rsplayer-${RELEASE_VERSION} && rpmbuild -bb --target ${rpm_arch} --define \"_topdir $(pwd)\" --define \"_builddir $(pwd)\" --define \"_sourcedir $(pwd)\" --define \"_srcrpmdir $(pwd)\" --define \"_rpmdir $(pwd)/RPMS\" rsplayer.spec && mv RPMS/${rpm_arch}/*.rpm rsplayer_${RELEASE_VERSION}_${rpm_arch}.rpm",
]

[tasks.package_arch_release]
script = [
    "ARCH_DIR=target/${TARGET}/arch",
    "mkdir -p ${ARCH_DIR}",
    "cp target/${TARGET}/release/rsplayer ${ARCH_DIR}/rsplayer",
    "cp PKGS/debian/etc/systemd/system/rsplayer.service ${ARCH_DIR}/rsplayer.service",
    "cp PKGS/debian/etc/polkit-1/rules.d/99-rsplayer.rules ${ARCH_DIR}/99-rsplayer.rules",
    "cp PKGS/debian/opt/rsplayer/env ${ARCH_DIR}/env",
    "cp PKGS/debian/opt/rsplayer/self.crt ${ARCH_DIR}/self.crt",
    "cp PKGS/debian/opt/rsplayer/self.key ${ARCH_DIR}/self.key",
    "case ${TARGET} in",
    "  arm-unknown-linux-gnueabihf) arch_arch=armhfv6 ;;",
    "  armv7-unknown-linux-gnueabihf) arch_arch=armhfv7 ;;",
    "  aarch64-unknown-linux-gnu) arch_arch=arm64 ;;",
    "  x86_64-unknown-linux-gnu) arch_arch=amd64 ;;",
    "  riscv64gc-unknown-linux-gnu) arch_arch=riscv64 ;;",
    "  *) arch_arch=${TARGET} ;;",
    "esac",
    "sed -e \"s/@VERSION@/${RELEASE_VERSION}/g\" -e \"s/@ARCH@/${arch_arch}/g\" PKGS/arch/PKGBUILD.in > ${ARCH_DIR}/PKGBUILD",
    "sed -e \"s/@VERSION@/${RELEASE_VERSION}/g\" PKGS/arch/rsplayer.install.in > ${ARCH_DIR}/rsplayer.install",
    "# Build tarball with full directory structure so tar -xzf -C / works",
    "mkdir -p ${ARCH_DIR}/rootfs/usr/bin ${ARCH_DIR}/rootfs/etc/systemd/system ${ARCH_DIR}/rootfs/etc/polkit-1/rules.d ${ARCH_DIR}/rootfs/opt/rsplayer",
    "cp ${ARCH_DIR}/rsplayer ${ARCH_DIR}/rootfs/usr/bin/rsplayer && chmod 755 ${ARCH_DIR}/rootfs/usr/bin/rsplayer",
    "cp ${ARCH_DIR}/rsplayer.service ${ARCH_DIR}/rootfs/etc/systemd/system/rsplayer.service",
    "cp ${ARCH_DIR}/99-rsplayer.rules ${ARCH_DIR}/rootfs/etc/polkit-1/rules.d/99-rsplayer.rules",
    "cp ${ARCH_DIR}/env ${ARCH_DIR}/rootfs/opt/rsplayer/env",
    "cp ${ARCH_DIR}/self.crt ${ARCH_DIR}/rootfs/opt/rsplayer/self.crt",
    "cp ${ARCH_DIR}/self.key ${ARCH_DIR}/rootfs/opt/rsplayer/self.key",
    "cd ${ARCH_DIR}/rootfs && tar -czf ../rsplayer_${RELEASE_VERSION}_${arch_arch}.tgz . && cd .. && rm -rf rootfs",
]

# ---- LINT ----
[tasks.clippy]
description = "Lint with Clippy"
install_crate = { rustup_component_name = "clippy", binary = "cargo-clippy", test_arg = "--help" }
command = "cargo"
args = [
    "clippy",
    "--fix",
    "--allow-dirty",
    "--allow-staged",
    "--all-features",
    "--",
    "--deny",
    "warnings",
    "--deny",
    "clippy::pedantic",
    "--deny",
    "clippy::nursery",
    "--allow",
    "clippy::use_self",
    "--allow",
    "clippy::module_name_repetitions",
    "--allow",
    "clippy::must_use_candidate",
    "--allow",
    "let_underscore_drop",
    "--allow",
    "clippy::missing_panics_doc",
    "--allow",
    "clippy::missing_errors_doc",
    "--allow",
    "clippy::use_self",
    "--allow",
    "clippy::significant-drop-tightening",
    "--allow",
    "clippy::similar_names",
]

[tasks.clippy_in_cross]
description = "Lint with clippy in the pipeline"
command = "cross"
args = [
    "clippy",
    "--target",
    "${TARGET}",
    "--",
    "--deny",
    "warnings",
    "--deny",
    "clippy::pedantic",
    "--deny",
    "clippy::nursery",
    "--allow",
    "clippy::use_self",
    "--allow",
    "clippy::module_name_repetitions",
    "--allow",
    "clippy::must_use_candidate",
    "--allow",
    "let_underscore_drop",
    "--allow",
    "clippy::missing_panics_doc",
    "--allow",
    "clippy::missing_errors_doc",
    "--allow",
    "clippy::use_self",
    "--allow",
    "clippy::significant-drop-tightening",
    "--allow",
    "clippy::similar_names",
]

[tasks.clippy_in_cross.env]
RUST_SYSROOT_LIB = { script = ["echo $(rustc --print sysroot)/lib"] }
CROSS_CONTAINER_OPTS = "-e LD_LIBRARY_PATH=${RUST_SYSROOT_LIB} -v ${RUST_SYSROOT_LIB}:${RUST_SYSROOT_LIB}"

[tasks.test_in_cross]
command = "cross"
args = ["test", "--target", "${TARGET}"]

[tasks.test_in_cross.env]
RUST_SYSROOT_LIB = { script = ["echo $(rustc --print sysroot)/lib"] }
CROSS_CONTAINER_OPTS = "-e LD_LIBRARY_PATH=${RUST_SYSROOT_LIB} -v ${RUST_SYSROOT_LIB}:${RUST_SYSROOT_LIB}"

[tasks.format]
description = "Format with rustfmt"
command = "cargo"
args = ["fmt"]

# ---- Local DEV ----
[tasks.kill_local]
script = "sudo pkill -9 rsplayer || true"

[tasks.run_local]
dependencies = ["kill_local", "build_dev"]
env = { "RUST_LOG" = "rsplayer=info,rsplayer_playback=debug,rsplayer_metadata=info,symphonia=info,warp=info", "RUST_BACKTRACE" = "full"}
script = [
    "set -e",
    "sudo /usr/bin/setcap 'cap_net_bind_service,cap_sys_boot,cap_sys_nice,cap_sys_admin,cap_dac_read_search+ep' target/debug/rsplayer",
    "cd .run && exec ../target/debug/rsplayer"
]

[tasks.copy_remote.env]
CARGO_TARGET_DIR = { value = "target/cross", condition = { env_not_set = ["CI"] } }

[tasks.copy_remote]
dependencies = ["build_release"]
script = [
    "rsync -avvP --rsync-path=\"sudo rsync\" ${CARGO_TARGET_DIR}/${TARGET}/release/rsplayer pi@${TARGET_HOST}:/usr/bin",
    "ssh -x pi@${TARGET_HOST} \"sudo systemctl restart rsplayer\"",
]

[tasks.copy_remote_mac.env]
CARGO_TARGET_DIR = { value = "target/cross", condition = { env_not_set = ["CI"] } }

[tasks.copy_remote_mac]
dependencies = ["build_release"]
script = [
    "scp -P 22220 ${CARGO_TARGET_DIR}/${TARGET}/release/rsplayer draganlj@${TARGET_HOST}:~"
]

[tasks.copy_remote_dev]
dependencies = ["build_dev"]
script = [
    "rsync -avvP --rsync-path=\"sudo rsync\" target/${TARGET}/debug/rsplayer pi@${TARGET_HOST}:/usr/bin",
]

[tasks.package_deb_local]
dependencies = ["build_ui_release", "build_release", "package_deb_release"]
script = "rsync -avvP target/${TARGET}/debian/*.deb pi@${TARGET_HOST}:~"

[tasks.tag]
script = [
    "git tag ${RELEASE_VERSION} ${RELEASE_BRANCH}",
    "git push originpublic ${RELEASE_VERSION}",
]

[tasks.run_as_rsplayer]
script = [
    "sudo systemctl stop rsplayer",
    "cargo make build_release",
    "sudo cp target/x86_64-unknown-linux-gnu/release/rsplayer /usr/bin",
    "sudo systemctl start rsplayer",
]
