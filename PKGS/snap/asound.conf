# Loaded via ALSA_CONFIG_PATH (see snap/snapcraft.yaml), which replaces the
# default top-level config — so pull in the staged alsa.conf first (resolved
# through the /usr/share/alsa layout, giving the hw:/plughw: templates and
# card definitions the bit-perfect path needs), then override the default
# PCM. Routes the ALSA "default" PCM to PulseAudio/PipeWire — served on the
# host through the audio-playback interface — with a direct sysdefault
# fallback when no sound server is running. hw: devices are unaffected and
# enumerate normally once the alsa interface is connected.
#
# NOTE: on a host whose /etc/alsa/conf.d routes the ALSA "default" PCM to the
# native `pipewire` plugin (e.g. Fedora), that host snippet is pulled in by
# the include and needs libasound_module_pcm_pipewire.so, which the snap does
# not ship — so the convenience "default"/Pipewire card fails there. This
# does not affect Ubuntu (the Snap Store target) or the hw: bit-perfect path
# (connect rsplayer:alsa and select a hw: device), which is host-independent.
</usr/share/alsa/alsa.conf>

pcm.!default {
    type pulse
    fallback "sysdefault"
    hint {
        show on
        description "Default ALSA Output (PulseAudio/PipeWire Sound Server)"
    }
}

ctl.!default {
    type pulse
    fallback "sysdefault"
}
