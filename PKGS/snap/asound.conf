# Loaded via ALSA_CONFIG_PATH (see snap/snapcraft.yaml), which replaces the
# default top-level config — so pull in the staged alsa.conf first (resolved
# through the /usr/share/alsa layout), then override the default PCM.
# Routes the ALSA "default" PCM to PulseAudio/PipeWire — served on the host
# through the audio-playback interface — with a direct sysdefault fallback
# when no sound server is running. hw: devices are unaffected and enumerate
# normally once the alsa interface is connected.
</usr/share/alsa/alsa.conf>

pcm.!default {
    type pulse
    fallback "sysdefault"
    hint {
        show on
        description "Default ALSA Output (PulseAudio/PipeWire Sound Server)"
    }
}

ctl.!default {
    type pulse
    fallback "sysdefault"
}
