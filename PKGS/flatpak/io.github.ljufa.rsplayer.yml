# Flatpak manifest for the RSPlayer desktop app (Tauri wrapper around the
# embedded server). Built from a staged copy of the source tree (`src/` next
# to this manifest — see stage-sources.sh): locally via `cargo make
# build_flatpak`, and on release by the `build_flatpak` job in
# .github/workflows/cd.yml, which publishes the result to the self-hosted
# flatpak repo at https://ljufa.github.io/rsplayer-flatpak.
#
# See PKGS/flatpak/README.md for how to regenerate cargo-sources.json and
# build/test locally.
app-id: io.github.ljufa.rsplayer
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: rsplayer-desktop

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Regular playback through the PipeWire/PulseAudio socket.
  - --socket=pulseaudio
  # Direct ALSA (hw:) access for bit-perfect / exclusive output to USB DACs.
  - --device=all
  # The webview talks to the embedded server on localhost; network is also
  # needed for internet radio, streaming metadata and multiroom (QUIC + LAN
  # discovery).
  - --share=network
  # Media keys / MPRIS integration via souvlaki. Must match the dbus_name
  # configured in crates/desktop/src/main.rs.
  - --own-name=org.mpris.MediaPlayer2.rsplayer
  # Default music library location. Users with libraries elsewhere can grant
  # more paths with Flatseal or `flatpak override`. Note: symlinks under
  # ~/Music only resolve if their target is also granted.
  - --filesystem=xdg-music:ro
  # Music libraries commonly live on external/removable drives or host mounts.
  - --filesystem=/media:ro
  - --filesystem=/run/media:ro
  - --filesystem=/mnt:ro

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/rsplayer/cargo

modules:
  - name: rsplayer
    buildsystem: simple
    build-commands:
      # The Tauri window first loads loading.html from the frontend dist.
      - cp crates/desktop/loading.html dist/web-ui/loading.html
      # No `cargo fetch` warm-up: it would also resolve dev-dependencies of
      # path dependencies (e.g. cpal's examples), which are not vendored.
      - cargo --offline build --release --package rsplayer-desktop --features custom-protocol
      - install -Dm755 target/release/rsplayer-desktop /app/bin/rsplayer-desktop
      - install -Dm644 PKGS/flatpak/io.github.ljufa.rsplayer.desktop /app/share/applications/io.github.ljufa.rsplayer.desktop
      - install -Dm644 PKGS/flatpak/io.github.ljufa.rsplayer.metainfo.xml /app/share/metainfo/io.github.ljufa.rsplayer.metainfo.xml
      - install -Dm644 crates/desktop/icons/icon.png /app/share/icons/hicolor/512x512/apps/io.github.ljufa.rsplayer.png
      - install -Dm644 'crates/desktop/icons/128x128@2x.png' /app/share/icons/hicolor/256x256/apps/io.github.ljufa.rsplayer.png
      - install -Dm644 crates/desktop/icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.github.ljufa.rsplayer.png
    sources:
      # Staged source tree (tracked files + the pre-built dist/web-ui),
      # produced by PKGS/flatpak/stage-sources.sh next to this manifest.
      - type: dir
        path: src
      # Vendored crate sources for the offline build. Regenerate on every
      # Cargo.lock change — see PKGS/flatpak/README.md.
      - cargo-sources.json
