# ---- BUILD UI ----
# Generates Tailwind CSS, then compiles WASM with Dioxus, then copies output to dist/

[tasks.build_css]
description = "Build Tailwind CSS + DaisyUI"
command = "tailwindcss"
args = ["-i", "input.css", "-o", "public/tw.css", "--minify"]

[tasks.build_css_dev]
description = "Build Tailwind CSS + DaisyUI (dev, no minify)"
command = "tailwindcss"
args = ["-i", "input.css", "-o", "public/tw.css"]

[tasks.watch_css]
description = "Watch input.css and rebuild Tailwind on changes"
command = "tailwindcss"
args = ["-i", "input.css", "-o", "public/tw.css", "--watch"]

[tasks.dx_serve]
description = "Run dx serve for dev"
command = "dx"
args = ["serve", "--platform", "web"]

[tasks.serve_dev]
description = "Run Tailwind watch + dx serve concurrently"
run_task = { name = ["watch_css", "dx_serve"], parallel = true }

[tasks.build_release]
description = "Build release WASM with Dioxus"
dependencies = ["build_css"]
command = "dx"
args = ["build", "--platform", "web", "--release"]

[tasks.build_dev]
description = "Build dev WASM with Dioxus"
dependencies = ["build_css_dev"]
command = "dx"
args = ["build", "--platform", "web"]