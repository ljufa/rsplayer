name: Build builder images

on:
  push:
    branches: [main_public]
    paths:
      - 'docker/Dockerfile.*'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:
    inputs:
      image:
        description: "Which image(s) to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - builder
          - cross-linux
          - cross-armv6
          - cross-armv7
          - cross-aarch64
          - cross-x86_64
          - cross-riscv64

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  builder:
    name: Build builder image
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.image == 'all' || github.event.inputs.image == 'builder' }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.builder
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/rsplayer-builder:latest
          cache-from: type=gha,scope=rsplayer-builder
          cache-to: type=gha,mode=max,scope=rsplayer-builder

  
  cross-armv6:
    name: Cross image armv6
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.image == 'all' || github.event.inputs.image == 'cross-linux' || github.event.inputs.image == 'cross-armv6' }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
