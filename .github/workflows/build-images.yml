name: Build builder images

on:
  push:
    branches: [main_public]
    paths:
      - 'docker/Dockerfile.*'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  backend:
    name: Backend builder image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/rsplayer-backend-builder:latest
          cache-from: type=gha,scope=backend-builder
          cache-to: type=gha,mode=max,scope=backend-builder

  ui:
    name: UI builder image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ui
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/rsplayer-ui-builder:latest
          cache-from: type=gha,scope=ui-builder
          cache-to: type=gha,mode=max,scope=ui-builder
