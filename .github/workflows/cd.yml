name: Full release

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - arm-unknown-linux-gnueabihf
          - armv7-unknown-linux-gnueabihf
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-gnu
          - riscv64gc-unknown-linux-gnu
          - macos
          - windows
  push:
    tags:
      - "*.*.*"

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_ui:
    name: Build UI
    runs-on: [self-hosted, linux, x64]
    container:
      image: ghcr.io/${{ github.repository_owner }}/rsplayer-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      # The release version single source of truth is [workspace.package] in Cargo.toml.
      # Fail fast if a tag is pushed that does not match it.
      - name: Verify tag matches workspace version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "$version" != "${{ github.ref_name }}" ]; then
            echo "::error::Tag '${{ github.ref_name }}' does not match workspace version '$version' in Cargo.toml"
            exit 1
          fi
      # - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo make build_ui_release

      - name: Upload web public dir
        uses: actions/upload-artifact@v7
        with:
          name: web_ui
          path: dist/web-ui

  build_backend:
    needs: build_ui
    name: Release Backend
    if: ${{ github.event_name != 'workflow_dispatch' || (inputs.target != 'macos' && inputs.target != 'windows') }}
    runs-on: [self-hosted, linux, x64]
    container:
      image: ghcr.io/${{ github.repository_owner }}/rsplayer-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      # Mount host Docker socket so cross can launch cross-compilation containers
      options: -v /var/run/docker.sock:/var/run/docker.sock
    env:
      # Tell cross it is running inside a container so it doesn't try to mount
      # ~/.cargo / ~/.rustup from the host (those paths resolve on the host machine,
      # not inside this builder container, causing "cargo: not found" in cross containers)
      CROSS_CONTAINER_IN_CONTAINER: "true"
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.target != 'all' && inputs.target != 'macos' && format('["{0}"]', inputs.target)) || '["arm-unknown-linux-gnueabihf","armv7-unknown-linux-gnueabihf","aarch64-unknown-linux-gnu","x86_64-unknown-linux-gnu","riscv64gc-unknown-linux-gnu"]') }}
    steps:
      - uses: actions/checkout@v7
        with:
          clean: true

      # - uses: Swatinem/rust-cache@v2
      #   with:
      #     key: ${{ matrix.target }}

      - name: Download web_ui
        uses: actions/download-artifact@v8
        with:
          name: web_ui
          path: dist/web-ui

      - name: Build release binary
        run: cargo make --env TARGET=${{ matrix.target }} build_release

      # Produces all final-named release assets in target/<target>/pkg/:
      # rsplayer_<ver>_<suffix>.deb / .rpm / .tgz and the raw rsplayer_<suffix> binary
      - name: Package release assets (deb, rpm, arch tgz, binary)
        run: cargo make --env TARGET=${{ matrix.target }} package_linux_release

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: pkg-${{ matrix.target }}
          path: target/${{ matrix.target }}/pkg/*
          if-no-files-found: error

  build_desktop_linux:
    needs: build_ui
    name: Build Desktop (deb+rpm+arch tgz)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'x86_64-unknown-linux-gnu' }}
    runs-on: [self-hosted, linux, x64]
    container:
      image: ghcr.io/${{ github.repository_owner }}/rsplayer-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          clean: true

      # - uses: Swatinem/rust-cache@v2
      #   with:
      #     key: desktop-linux-x86_64

      - name: Download web_ui
        uses: actions/download-artifact@v8
        with:
          name: web_ui
          path: dist/web-ui

      - name: Build Desktop (deb+rpm)
        run: cargo make --env TARGET=x86_64-unknown-linux-gnu bundle_desktop_release

      - name: Upload desktop packages
        uses: actions/upload-artifact@v7
        with:
          name: pkg-desktop-linux-x86_64
          path: target/cross/x86_64-unknown-linux-gnu/pkg/*
          if-no-files-found: error

  build_desktop_macos:
    needs: build_ui
    name: Build macOS (DMG + server binary)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'macos' }}
    strategy:
          fail-fast: false
          matrix:
            include:
            - platform: macos-14
              rust_target: aarch64-apple-darwin
              bin_suffix: darwin_arm64
            - platform: macos-15-intel
              rust_target: x86_64-apple-darwin
              bin_suffix: darwin_amd64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      # - uses: Swatinem/rust-cache@v2
      #   with:
      #     key: ${{ matrix.target }}

      - name: Download web_ui
        uses: actions/download-artifact@v8
        with:
          name: web_ui
          path: dist/web-ui

      - name: Install cargo-packager
        run: cargo install cargo-packager

      - name: Build headless server binary
        run: cargo build --package rsplayer --bin rsplayer --release --no-default-features --target ${{ matrix.rust_target }}

      - name: Build desktop app and DMG
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          cargo build --package rsplayer-desktop --release --features custom-protocol --target ${{ matrix.rust_target }}
          cargo packager --packages rsplayer-desktop --release --target ${{ matrix.rust_target }} --formats dmg

      - name: Stage release assets
        run: |
          mkdir -p pkg
          cp target/${{ matrix.rust_target }}/release/*.dmg pkg/
          cp target/${{ matrix.rust_target }}/release/rsplayer pkg/rsplayer_${{ matrix.bin_suffix }}

      - name: Upload macOS assets
        uses: actions/upload-artifact@v7
        with:
          name: pkg-${{ matrix.rust_target }}
          path: pkg/*
          if-no-files-found: error

  build_desktop_windows:
    needs: build_ui
    name: Build Windows (headless exe + NSIS installer)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'windows' }}
    runs-on: [self-hosted, windows, x64]
    # ASIO output is linked into every Windows build. bindgen (via asio-sys)
    # needs libclang. This runner is self-hosted, so LLVM, Rust (rustup), the
    # MSVC C++ Build Tools and Git must be pre-installed on the machine — see
    # docs/build.md "Self-hosted Windows runner". LIBCLANG_PATH points at the
    # LLVM install.
    env:
      LIBCLANG_PATH: C:\Program Files\LLVM\bin
    steps:
      - uses: actions/checkout@v7

      # rustup is pre-installed on the runner; just make sure the toolchain and
      # MSVC target are present. Done in pwsh so we don't depend on bash (the
      # dtolnay/rust-toolchain action is a bash composite action, which a bare
      # Windows runner has no shell for).
      # - name: Install Rust toolchain
      #   shell: pwsh
      #   run: |
      #     rustup toolchain install stable --profile minimal
      #     rustup target add x86_64-pc-windows-msvc

      # - uses: Swatinem/rust-cache@v2
      #   with:
      #     key: desktop-windows-x86_64

      # ASIO SDK (Steinberg). The SDK is downloaded, not vendored, per its
      # license — redistributing the SDK is prohibited; shipping compiled
      # binaries is permitted. asio-sys reads CPAL_ASIO_DIR to locate it.
      - name: Cache ASIO SDK
        id: cache-asio
        uses: actions/cache@v4
        with:
          path: asiosdk
          key: asio-sdk-2.3.3

      - name: Download ASIO SDK
        if: steps.cache-asio.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri 'https://www.steinberg.net/asiosdk' -OutFile asiosdk.zip -UseBasicParsing
          Expand-Archive -Path asiosdk.zip -DestinationPath asiosdk -Force

      - name: Set CPAL_ASIO_DIR
        shell: powershell
        run: |
          $dir = (Get-ChildItem -Path "$env:GITHUB_WORKSPACE/asiosdk" -Directory | Select-Object -First 1).FullName
          echo "CPAL_ASIO_DIR=$dir" >> $env:GITHUB_ENV

      - name: Download web_ui
        uses: actions/download-artifact@v8
        with:
          name: web_ui
          path: dist/web-ui

      # - name: Install tauri-cli
      #   run: cargo install tauri-cli --version "^2" --locked

      - name: Build headless server binary
        run: cargo build --package rsplayer --bin rsplayer --release --no-default-features --features asio --target x86_64-pc-windows-msvc

      - name: Build desktop app and NSIS installer
        shell: powershell
        run: |
          Copy-Item crates/desktop/loading.html dist/web-ui/loading.html
          cd crates/desktop
          cargo tauri build --bundles nsis --ci

      - name: Stage release assets
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path pkg | Out-Null
          $installer = Get-ChildItem -Recurse -Filter *-setup.exe | Select-Object -First 1
          Copy-Item $installer.FullName pkg/rsplayer-desktop_windows_amd64.exe
          Copy-Item target/x86_64-pc-windows-msvc/release/rsplayer.exe pkg/rsplayer_windows_amd64.exe

      - name: Upload Windows assets
        uses: actions/upload-artifact@v7
        with:
          name: pkg-x86_64-pc-windows-msvc
          path: pkg/*
          if-no-files-found: error

  publish:
    if: ${{ always() }}
    needs: [build_backend, build_desktop_macos, build_desktop_linux, build_desktop_windows]
    name: Create release
    runs-on: [self-hosted, linux, x64]
    steps:
      # All artifacts already carry their final release asset names
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: pkg-*
          path: release_assets
          merge-multiple: true

      - name: List release assets
        run: ls -R release_assets

      - name: Create release
        uses: ncipollo/release-action@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          artifacts: "release_assets/*"
          draft: true
          prerelease: true
          generateReleaseNotes: true
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
