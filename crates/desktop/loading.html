<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; min-height: 100dvh;
  }
  .box { text-align: center; }
  h1 { font-size: 3rem; font-weight: 700; margin-bottom: 0.5rem; }
  p { color: #94a3b8; font-size: 1rem; margin-bottom: 1.5rem; }
  .spinner {
    display: inline-block; width: 3rem; height: 3rem;
    border: 3px solid #334155; border-top-color: #3b82f6;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="box">
  <h1>RSPlayer</h1>
  <p>Starting, please wait…</p>
  <div class="spinner"></div>
</div>
</body>
</html>
